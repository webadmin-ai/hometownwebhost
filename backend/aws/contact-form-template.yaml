AWSTemplateFormatVersion: '2010-09-09'
Description: 'Hometown Web Host contact form backend: API Gateway (API key auth) -> Lambda -> SNS'

Parameters:
  Environment:
    Type: String
    Default: 'prod'
    Description: 'Environment name, used as a resource name prefix'

  NotificationEmail:
    Type: String
    Default: 'support@hometownwebhost.com'
    Description: 'Email address to receive contact form notifications (SNS will send a confirmation link here first)'

  AllowedOrigin:
    Type: String
    Default: 'https://www.hometownwebhost.com'
    Description: 'Origin allowed to call this API (CORS)'

Resources:
  ContactFormTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${Environment}-hometownwebhost-contact-form-notifications'
      DisplayName: 'Hometown Web Host Contact Form Notifications'

  ContactFormEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      TopicArn: !Ref ContactFormTopic
      Endpoint: !Ref NotificationEmail

  ContactFormLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-hometownwebhost-contact-form-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SNSPublishPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref ContactFormTopic

  ContactFormLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${Environment}-hometownwebhost-contact-form-processor'
      Runtime: python3.13
      Handler: index.lambda_handler
      Role: !GetAtt ContactFormLambdaRole.Arn
      Timeout: 10
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref ContactFormTopic
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Code:
        ZipFile: |
          import json
          import os
          import re
          from datetime import datetime, timezone

          import boto3

          sns = boto3.client('sns')

          EMAIL_RE = re.compile(r'^[^@\s]+@[^@\s]+\.[^@\s]+$')
          ALLOWED_ORIGIN = os.environ['ALLOWED_ORIGIN']

          CORS_HEADERS = {
              'Content-Type': 'application/json',
              'Access-Control-Allow-Origin': ALLOWED_ORIGIN,
              'Access-Control-Allow-Headers': 'Content-Type,X-Api-Key',
              'Access-Control-Allow-Methods': 'POST, OPTIONS'
          }

          def _response(status_code, body):
              return {
                  'statusCode': status_code,
                  'headers': CORS_HEADERS,
                  'body': json.dumps(body)
              }

          def lambda_handler(event, context):
              try:
                  raw_body = event.get('body') or '{}'
                  if event.get('isBase64Encoded'):
                      import base64
                      raw_body = base64.b64decode(raw_body).decode('utf-8')
                  form_data = json.loads(raw_body)
              except json.JSONDecodeError:
                  return _response(400, {'error': 'Invalid JSON in request body'})

              name = (form_data.get('name') or '').strip()
              email = (form_data.get('email') or '').strip()
              phone = (form_data.get('phone') or '').strip()
              message = (form_data.get('message') or '').strip()
              has_existing_website = bool(form_data.get('hasExistingWebsite'))
              website_name = (form_data.get('websiteName') or '').strip()

              if not name or not email or not message:
                  return _response(400, {'error': 'Missing required field: name, email, and message are required'})
              if not EMAIL_RE.match(email):
                  return _response(400, {'error': 'Invalid email address'})
              if len(name) > 100 or len(email) > 254 or len(message) > 1000:
                  return _response(400, {'error': 'Field too long'})

              if has_existing_website:
                  existing_website_line = f'Yes ({website_name})' if website_name else 'Yes'
              else:
                  existing_website_line = 'No'

              sns_message = (
                  'New Contact Form Submission\n\n'
                  f'Timestamp: {datetime.now(timezone.utc).isoformat()}\n\n'
                  f'Name: {name}\n'
                  f'Email: {email}\n'
                  f'Phone: {phone if phone else "Not provided"}\n'
                  f'Existing website: {existing_website_line}\n\n'
                  f'Message:\n{message}\n'
              )

              try:
                  sns_response = sns.publish(
                      TopicArn=os.environ['SNS_TOPIC_ARN'],
                      Message=sns_message,
                      Subject=f'New contact form submission from {name}'[:100]
                  )
              except Exception as e:
                  print(f'Error publishing to SNS: {str(e)}')
                  return _response(500, {'error': 'Internal server error'})

              return _response(200, {
                  'message': 'Contact form submitted successfully',
                  'messageId': sns_response['MessageId']
              })

  ContactFormApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${Environment}-hometownwebhost-contact-form-api'
      Description: 'API for processing the hometownwebhost.com contact form'
      EndpointConfiguration:
        Types:
          - REGIONAL

  ContactFormResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ContactFormApi
      ParentId: !GetAtt ContactFormApi.RootResourceId
      PathPart: 'contact'

  ContactFormMethodPost:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ContactFormApi
      ResourceId: !Ref ContactFormResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ContactFormLambda.Arn}/invocations'
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: 'Empty'
        - StatusCode: 400
          ResponseModels:
            application/json: 'Empty'
        - StatusCode: 500
          ResponseModels:
            application/json: 'Empty'

  ContactFormMethodOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ContactFormApi
      ResourceId: !Ref ContactFormResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: !Sub "'${AllowedOrigin}'"
            ResponseTemplates:
              application/json: ''
        PassthroughBehavior: WHEN_NO_MATCH
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: 'Empty'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  ContactFormLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ContactFormLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ContactFormApi}/*/POST/contact'

  ContactFormApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ContactFormMethodPost
      - ContactFormMethodOptions
    Properties:
      RestApiId: !Ref ContactFormApi
      StageName: !Ref Environment

  ContactFormApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn:
      - ContactFormApiDeployment
    Properties:
      Name: !Sub '${Environment}-hometownwebhost-contact-form-api-key'
      Description: 'API Key for the hometownwebhost contact form API'
      Enabled: true

  ContactFormUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn:
      - ContactFormApiDeployment
    Properties:
      UsagePlanName: !Sub '${Environment}-hometownwebhost-contact-form-usage-plan'
      Description: 'Usage plan for the hometownwebhost contact form API'
      ApiStages:
        - ApiId: !Ref ContactFormApi
          Stage: !Ref Environment
      Throttle:
        BurstLimit: 10
        RateLimit: 5

  ContactFormUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ContactFormApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref ContactFormUsagePlan

Outputs:
  ApiEndpoint:
    Description: 'API Gateway endpoint URL'
    Value: !Sub 'https://${ContactFormApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/contact'
    Export:
      Name: !Sub '${Environment}-hometownwebhost-contact-form-api-endpoint'

  ApiKeyId:
    Description: 'API Key ID (fetch the value with: aws apigateway get-api-key --api-key <this-id> --include-value)'
    Value: !Ref ContactFormApiKey
    Export:
      Name: !Sub '${Environment}-hometownwebhost-contact-form-api-key-id'

  SNSTopicArn:
    Description: 'SNS Topic ARN for contact form notifications'
    Value: !Ref ContactFormTopic
    Export:
      Name: !Sub '${Environment}-hometownwebhost-contact-form-sns-topic'

  LambdaFunctionArn:
    Description: 'Lambda function ARN'
    Value: !GetAtt ContactFormLambda.Arn
    Export:
      Name: !Sub '${Environment}-hometownwebhost-contact-form-lambda-arn'
