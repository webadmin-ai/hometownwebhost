<svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Home Town Web Host Logo - Option 1</title>
  <desc>A house icon integrated with a globe/network, with the company name</desc>

  <!-- House shape with network globe inside -->
  <g transform="translate(20, 15)">
    <!-- Globe circle -->
    <circle cx="60" cy="80" r="42" fill="#1a6ef5" opacity="0.12"/>
    <circle cx="60" cy="80" r="42" fill="none" stroke="#1a6ef5" stroke-width="2"/>
    <!-- Globe lines -->
    <ellipse cx="60" cy="80" rx="20" ry="42" fill="none" stroke="#1a6ef5" stroke-width="1.2" opacity="0.6"/>
    <line x1="18" y1="80" x2="102" y2="80" stroke="#1a6ef5" stroke-width="1.2" opacity="0.6"/>
    <line x1="22" y1="60" x2="98" y2="60" stroke="#1a6ef5" stroke-width="1" opacity="0.4"/>
    <line x1="22" y1="100" x2="98" y2="100" stroke="#1a6ef5" stroke-width="1" opacity="0.4"/>

    <!-- House outline over globe -->
    <polygon points="60,28 100,60 96,60 96,108 24,108 24,60 20,60" fill="#ffffff" stroke="#1a6ef5" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Roof peak fill -->
    <polygon points="60,28 100,60 20,60" fill="#1a6ef5"/>
    <!-- Door -->
    <rect x="50" y="82" width="20" height="26" rx="3" fill="#1a6ef5"/>
    <!-- Window left -->
    <rect x="31" y="70" width="14" height="12" rx="2" fill="#1a6ef5" opacity="0.7"/>
    <!-- Window right -->
    <rect x="75" y="70" width="14" height="12" rx="2" fill="#1a6ef5" opacity="0.7"/>
    <!-- Wifi signal from chimney -->
    <line x1="72" y1="35" x2="72" y2="22" stroke="#f97316" stroke-width="2"/>
    <path d="M63,26 Q72,18 81,26" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
    <path d="M67,21 Q72,14 77,21" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
    <circle cx="72" cy="10" r="2.5" fill="#f97316"/>
  </g>

  <!-- Company Name -->
  <text x="140" y="62" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#0f2a6e" letter-spacing="-0.5">Home Town</text>
  <text x="140" y="92" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#1a6ef5" letter-spacing="-0.5">Web Host</text>

  <!-- Tagline -->
  <text x="141" y="115" font-family="Arial, sans-serif" font-size="12" fill="#64748b" letter-spacing="2">YOUR LOCAL ONLINE HOME</text>

  <!-- Divider line -->
  <line x1="140" y1="100" x2="370" y2="100" stroke="#e2e8f0" stroke-width="1"/>
</svg>
